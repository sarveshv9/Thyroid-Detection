version: '3.8'
services:
  web:
    build: .
    ports:
    - 5000:5000
    env_file:
    - .env
    environment:
    - DATABASE_URL=postgresql://username:password@db:5432/thyroid_db
    - REDIS_URL=redis://redis:6379/0
    - FLASK_ENV=development
    - PORT=5000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
    - .:/app
    - /app/venv
    - /app/__pycache__
    - chroma_data:/app/chroma_db
  db:
    image: postgres:15-alpine
    environment:
    - POSTGRES_USER=username
    - POSTGRES_PASSWORD=password
    - POSTGRES_DB=thyroid_db
    ports:
    - 5432:5432
    volumes:
    - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U username -d thyroid_db
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
    - 6379:6379
    volumes:
    - redis_data:/data
volumes:
  postgres_data: null
  redis_data: null
  chroma_data: null
